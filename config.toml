model_provider = "fastaicode"
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
network_access = "enabled"
disable_response_storage = true
windows_wsl_setup_acknowledged = true
model_verbosity = "high"
personality = "pragmatic"

[model_providers.fastaicode]
name = "fastaicode"
base_url = "https://new.fastaicode.top"
wire_api = "responses"
requires_openai_auth = true

[features]
multi_agent = true

[agents]
max_threads = 3

[agents.coder]
description = "负责代码实现与修复"
model = "gpt-5.4"
prompt = "你负责代码实现与修复；优先最小变更并补齐测试。"

[agents.reviewer]
description = "负责代码审查与风险检查"
model = "gpt-5.4"
prompt = "你只做审查，重点看回归风险、边界条件和测试缺口。"

[mcp_servers.sequential-thinking]
url = "https://server.smithery.ai/@smithery-ai/server-sequential-thinking"

[mcp_servers.context7]
url = "https://context7-mcp--upstash.run.tools"

[mcp_servers.exa_search]
url = "https://exa.run.tools"

[mcp_servers.github]
url = "https://github.run.tools"

[mcp_servers.clear_thought]
url = "https://clear-thought--waldzellai.run.tools"

[mcp_servers.grep_github]
url = "https://grep--vercel.run.tools"

[mcp_servers.shrimp-task-manager]
command = "node"
args = ["/home/zazaki/.local/share/mcp-servers/shrimp-task-manager/node_modules/mcp-shrimp-task-manager/dist/index.js"]

[mcp_servers.shrimp-task-manager.env]
DATA_DIR = "/home/zazaki/.local/share/shrimp-task-manager"
ENABLE_GUI = "false"
TEMPLATES_USE = "zh"

#[mcp_servers.wakatime]
#url = "https://wakatime.run.tools"
#startup_timeout_sec = 30

[notice]
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[projects."/home/zazaki"]
trust_level = "trusted"

[projects."/home/zazaki/.codex"]
trust_level = "trusted"

[projects."/home/zazaki/Projects/ZLMediaKit/ZLMediaKit"]
trust_level = "trusted"

[projects."/home/zazaki/Projects/applicantapp-master"]
trust_level = "trusted"

[projects."/home/zazaki/Projects/Personalized-learning-navigation-system"]
trust_level = "trusted"
